databases:
  - name: vape-wallpaper-studio-db
    plan: basic-256mb
    databaseName: vape_wallpaper_studio
    user: vape_wallpaper_studio

services:
  - type: web
    name: vape-wallpaper-studio
    runtime: node
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        fromDatabase:
          name: vape-wallpaper-studio-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_INVITE_CODE
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: SVG_API_BASE_URL
        value: https://api.svgmaker.io/v1
      - key: SVG_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_ENDPOINT
        value: /chat/completions
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: BFL_API_KEY
        sync: false
